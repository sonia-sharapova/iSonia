<!DOCTYPE html>

  <style>
    /* ── Page layout ── */
    .photos-wrap {
      display: flex;
      width: 80%;
      margin: 0 auto;
      padding: 0 20px;
      gap: 40px;
    }
    .photos-sidebar {
      width: 140px;
      flex-shrink: 0;
      margin-top: 20px;
    }
    .photos-main {
      flex: 1;
      min-width: 0;
      margin-top: 20px;
    }
    .sidebar-section { margin-bottom: 30px; }
    .sidebar-title {
      font-size: 18px;
      font-weight: 500;
      color: #666;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ddd;
    }
    .sidebar-link {
      display: block;
      padding: 8px 0 8px 10px;
      color: #888f8d;
      text-decoration: none;
      font-size: 18px;
      transition: all 0.3s ease;
      border-left: 2px solid transparent;
    }
    .sidebar-link:hover { color: #45a049; border-left-color: #45a049; padding-left: 18px; }
    .sidebar-link.active { color: #45a049; border-left-color: #45a049; font-weight: 500; }

    @media (max-width: 960px) { .photos-wrap { width: 94%; } }
    @media (max-width: 768px) {
      .photos-wrap { flex-direction: column; width: 95%; padding: 0; gap: 0; }
      .photos-sidebar { display: none; }
      .photos-main { margin-top: 10px; }
    }

    #back-btn {
      position: static !important;
      width: auto !important; height: auto !important;
      min-height: unset !important; min-width: unset !important;
      background: none !important; border-radius: 0 !important;
      display: inline !important;
    }

    /* ── Admin toolbar ── */
    .admin-toolbar {
      display: none;
      gap: 10px;
      margin-bottom: 22px;
      align-items: center;
    }
    body.admin-mode .admin-toolbar { display: flex; }
    body.admin-mode.select-mode .admin-toolbar { display: none; }

    .admin-btn {
      background: rgba(210,245,250,0.4);
      border: 1px solid rgba(143,97,77,0.3);
      color: #1d60c0;
      font-family: 'Optima', arial, sans-serif;
      font-size: 13px;
      padding: 7px 14px;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
      min-height: unset !important; min-width: unset !important;
    }
    .admin-btn:hover { background: #c2e2e787; }
    .admin-hint { font-size: 12px; color: #bbb; font-style: italic; min-height: unset !important; display: inline !important; }

    /* ── Multi-select toolbar ── */
    .select-toolbar {
      display: none;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
      padding: 9px 14px;
      background: rgba(210,245,250,0.3);
      border: 1px solid rgba(143,97,77,0.2);
    }
    body.select-mode .select-toolbar { display: flex; flex-wrap: wrap; }
    .select-count { font-size: 13px; color: #666; }
    .select-spacer { flex: 1; }
    .select-album-label { font-size: 12px; color: #999; }
    .select-album-dropdown {
      font-family: 'Optima', arial, sans-serif;
      font-size: 13px;
      border: 1px solid #ddd;
      padding: 5px 8px;
      background: #fafafa;
      color: #555;
      outline: none;
      cursor: pointer;
    }

    /* ── Album list ── */
    .album-block { margin-bottom: 48px; }
    .album-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .album-title-link {
      font-size: 19px; font-weight: 300; color: #444;
      letter-spacing: 0.03em; cursor: pointer;
      font-family: 'Optima', arial, sans-serif;
      text-decoration: none;
      min-height: unset !important; min-width: unset !important; display: inline !important;
    }
    .album-title-link:hover { text-decoration: underline; }
    .album-count { font-size: 12px; color: #bbb; min-height: unset !important; display: inline !important; }
    .album-admin-btns { display: none; gap: 6px; margin-left: 4px; }
    body.admin-mode .album-admin-btns { display: flex; }
    .album-edit-btn {
      font-size: 11px; background: rgba(0,80,200,0.12); color: #1d60c0;
      border: 1px solid rgba(0,80,200,0.25); padding: 3px 8px; cursor: pointer;
      border-radius: 2px; min-height: unset !important; min-width: unset !important;
    }
    .album-edit-btn:hover { background: rgba(0,80,200,0.2); }
    .album-del-btn {
      font-size: 11px; background: rgba(200,0,0,0.08); color: #c00;
      border: 1px solid rgba(200,0,0,0.2); padding: 3px 8px; cursor: pointer;
      border-radius: 2px; min-height: unset !important; min-width: unset !important;
    }
    .album-del-btn:hover { background: rgba(200,0,0,0.18); }

    /* Album preview strip */
    .album-strip { display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px; cursor: pointer; }
    .album-strip:hover .album-strip-img img { opacity: 0.84; }
    .album-strip-img { aspect-ratio: 1; overflow: hidden; background: #f5f5f5; }
    .album-strip-img img {
      width: 100%; height: 100%; object-fit: contain; display: block;
      animation: none; transition: opacity 0.2s; min-height: unset !important;
    }
    .album-desc { font-size: 13px; color: #aaa; margin: 0 0 8px; }
    .album-see-all {
      display: inline-block; margin-top: 8px; font-size: 12px; color: #999;
      letter-spacing: 0.05em; cursor: pointer; text-decoration: none; min-height: unset !important;
    }
    .album-see-all:hover { color: #444; }

    /* ── Single album view ── */
    #album-view { display: none; }
    .album-view-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 22px; flex-wrap: wrap;
    }
    .back-btn {
      background: none; border: none; font-size: 12px; color: #999; cursor: pointer;
      padding: 0; letter-spacing: 0.07em; font-family: 'Optima', arial, sans-serif;
      min-height: unset !important; min-width: unset !important;
    }
    .back-btn:hover { color: #333; }
    .album-view-title { font-size: 21px; font-weight: 200; color: #444; letter-spacing: 0.04em; }

    /* ── All-photos uniform grid ── */
    .all-photos-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .all-photo-cell {
      width: 175px;
      height: 110px;
      flex: none;
      overflow: hidden;
      background: #f0f0f0;
      cursor: pointer;
      position: relative;
    }
    .all-photo-cell img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      animation: none;
      transition: opacity 0.2s;
      min-height: unset !important;
    }
    .all-photo-cell:hover img { opacity: 0.86; }
    @media (max-width: 640px) {
      .all-photo-cell { width: 150px; height: 95px; }
    }

    /* ── Photo rows layout ── */
    .photo-rows-container { display: flex; flex-direction: column; gap: 6px; }

    .photo-row {
      display: flex;
      gap: 3px;
      height: 160px;
      align-items: flex-start;
      cursor: pointer;
      position: relative;
    }
    .photo-row:hover .row-img img { opacity: 0.86; }
    body.select-mode .photo-row { cursor: default; }

    .row-img {
      height: 100%;
      flex: none;
      overflow: hidden;
      background: #eee;
      position: relative;
    }
    .row-img img {
      height: 100%;
      width: auto;
      display: block;
      object-fit: cover;
      animation: none;
      transition: opacity 0.2s;
      min-height: unset !important;
      pointer-events: none;
    }

    /* select overlay */
    .row-img .select-check {
      display: none;
      position: absolute;
      top: 5px; left: 5px;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.25);
      border-radius: 2px;
      z-index: 5;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: transparent;
    }
    body.select-mode .row-img .select-check { display: flex; cursor: pointer; }
    .row-img.selected .select-check {
      background: #1d60c0;
      border-color: #1d60c0;
      color: #fff;
    }
    .row-img.selected::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(29,96,192,0.18);
      pointer-events: none;
    }

    /* admin per-photo buttons (inside row) */
    .row-img .photo-admin-btns {
      display: none;
      position: absolute;
      top: 5px; right: 5px;
      gap: 4px;
      z-index: 10;
    }
    body.admin-mode:not(.select-mode) .row-img:hover .photo-admin-btns { display: flex; }
    .photo-edit-btn {
      background: rgba(0,0,0,0.6); color: #fff; border: none;
      font-size: 12px; padding: 4px 7px; cursor: pointer;
      min-height: unset !important; min-width: unset !important;
    }
    .photo-del-btn {
      background: rgba(180,0,0,0.75); color: #fff; border: none;
      font-size: 12px; padding: 4px 7px; cursor: pointer;
      min-height: unset !important; min-width: unset !important;
    }
    .photo-edit-btn:hover { background: rgba(0,0,0,0.85); }
    .photo-del-btn:hover  { background: rgba(180,0,0,1); }

    /* ── Row modal ── */
    #row-modal .modal-box {
      width: min(82vw, 900px);
      max-height: 85vh;
      overflow-y: auto;
      padding: 30px 30px 26px;

    .row-modal-inner {

    }
    .row-modal-item { flex: none; text-align: left; max-width: 200px; }
    .row-modal-item img {

      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
      animation: none;

    }
    .row-modal-id { font-size: 10px; color: #bbb; margin-top: 6px; letter-spacing: 0.05em; }
    .row-modal-caption { font-size: 12px; color: #555; margin-top: 3px; line-height: 1.4; }
    .row-modal-date { font-size: 11px; color: #aaa; margin-top: 2px; }
    .row-modal-close {
      float: right; background: none; border: none; font-size: 18px; color: #aaa;
      cursor: pointer; margin: -8px -8px 12px 0;
      min-height: unset !important; min-width: unset !important;
    }
    .row-modal-close:hover { color: #333; }

    /* ── Lightbox ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); z-index: 1000;
      align-items: center; justify-content: center;
    }
    #lightbox.active { display: flex; }
    #lightbox-img {
      max-width: 88vw; max-height: 86vh; object-fit: contain;
      animation: none; display: block; min-height: unset !important;
    }
    #lightbox-close {
      position: fixed; top: 20px; right: 26px;
      color: rgba(255,255,255,0.65); font-size: 26px; cursor: pointer;
      background: none; border: none; min-height: unset !important; min-width: unset !important;
    }
    #lightbox-close:hover { color: #fff; }
    #lightbox-caption {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.55); font-size: 13px;
      letter-spacing: 0.05em; text-align: center; white-space: nowrap;
    }
    #lightbox-prev, #lightbox-next {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: rgba(255,255,255,0.45);
      font-size: 36px; cursor: pointer; padding: 16px 20px;
      transition: color 0.15s; min-height: unset !important; min-width: unset !important;
    }
    #lightbox-prev:hover, #lightbox-next:hover { color: #fff; }
    #lightbox-prev { left: 0; }
    #lightbox-next { right: 0; }
    #lightbox-counter {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 0.08em;
    }

    /* ── Modals ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 600;
      align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: #fff; padding: 28px 34px 32px;
      width: 400px; max-width: 94vw; max-height: 90vh;
      overflow-y: auto; border: 1px solid #ddd;
    }
    .modal-box h3 { font-weight: 300; font-size: 20px; margin: 0 0 18px; color: #444; }
    .modal-box label {
      display: block; font-size: 13px; color: #777;
      margin: 14px 0 4px; min-height: unset !important;
    }
    .modal-box input[type=text],
    .modal-box textarea,
    .modal-box select {
      width: 100%; box-sizing: border-box; border: 1px solid #ddd;
      padding: 8px 10px; font-family: 'Optima', arial, sans-serif;
      font-size: 14px; color: #444; background: #fafafa;
      outline: none; min-height: unset !important;
    }
    .modal-box input[type=text]:focus,
    .modal-box textarea:focus,
    .modal-box select:focus { border-color: #aac; }
    .modal-box textarea { resize: vertical; min-height: 58px; }
    .modal-box input[type=file] { margin-top: 4px; font-size: 13px; }
    .modal-img-preview {
      max-height: 100px; max-width: 100%; margin-top: 8px;
      object-fit: contain; display: none; border: 1px solid #eee;
      min-height: unset !important;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-save-btn {
      background: rgba(210,245,250,0.5); border: 1px solid rgba(143,97,77,0.35);
      color: #1d60c0; font-family: 'Optima', arial, sans-serif;
      font-size: 14px; padding: 9px 22px; cursor: pointer; min-height: unset !important;
    }
    .modal-save-btn:hover { background: #c2e2e787; }
    .modal-cancel-btn {
      background: none; border: 1px solid #ddd; color: #999;
      font-family: 'Optima', arial, sans-serif;
      font-size: 14px; padding: 9px 18px; cursor: pointer; min-height: unset !important;
    }
    .modal-cancel-btn:hover { border-color: #aaa; color: #555; }
    .modal-saving { opacity: 0.6; pointer-events: none; }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      .album-strip { grid-template-columns: repeat(6, 1fr); }
      .album-strip-img:nth-child(n+7) { display: none; }
      .photo-row { height: 120px; }
    }
    @media (max-width: 640px) {
      .album-strip { grid-template-columns: repeat(4, 1fr); }
      .album-strip-img:nth-child(n+5) { display: none; }
      .photo-row { height: 90px; }
    }
  </style>

<script>
const DATA_URL   = 'data/albums.json';
const SAVE_URL   = 'admin/save-albums.php';
const UPLOAD_URL = 'admin/upload-image.php';
const ROW_CHUNK  = 6; // default photos per auto-row

let albums = [];
let currentAlbumId = null;
let lightboxPhotos = [];
let lightboxIdx = 0;
let isAdmin = false;
let dragSrc = null;
let selectedPhotos = new Set();
let selectMode = false;

async function init() {
  try {
    const s = await fetch('admin/check-session.php').then(r => r.json());
    if (s.admin) { isAdmin = true; document.body.classList.add('admin-mode'); }
  } catch(e) {}

  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    albums = r.ok ? (await r.json()) : [];
    if (!Array.isArray(albums)) albums = [];
  } catch(e) { albums = []; }

  renderSidebar(null);
  renderAlbumList();
}

// ── Sidebar ──────────────────────────────────────────────────────
function renderSidebar(activeId) {
  const sidebarAll = document.getElementById('sidebar-all');
  const sidebarAlbums = document.getElementById('sidebar-albums');
  if (sidebarAll) sidebarAll.className = 'sidebar-link' + (activeId == null ? ' active' : '');
  if (sidebarAlbums) {
    sidebarAlbums.innerHTML = albums.map(a =>
      `<a class="sidebar-link${a.id === activeId ? ' active' : ''}" href="#"
          onclick="openAlbum('${a.id}');return false;">• ${esc(a.name)}</a>`
    ).join('');
  }
}

// ── Album list (all photos flat grid) ────────────────────────────
function renderAlbumList() {
  currentAlbumId = null;
  renderSidebar(null);
  document.getElementById('album-list').style.display = 'block';
  document.getElementById('album-view').style.display  = 'none';

  const allPhotos = albums.flatMap(a => a.photos || []);
  lightboxPhotos = allPhotos.slice();

  const container = document.getElementById('albums-container');
  if (!allPhotos.length) {
    container.innerHTML = '<p style="color:#ccc;font-size:14px;margin-top:28px;">No photos yet' +
      (isAdmin ? ' — click <strong>+ New Album</strong> to start.' : '.') + '</p>';
    return;
  }

  // Section: album directory (admin only) + all-photos grid
  const albumDir = isAdmin ? `<div style="margin-bottom:28px;">
    ${albums.map(a => `<div class="album-header" style="margin-bottom:8px;">
      <a class="album-title-link" onclick="openAlbum('${a.id}');return false;" href="#">${esc(a.name)}</a>
      <span class="album-count">${(a.photos||[]).length}</span>
      <div class="album-admin-btns">
        <button class="album-edit-btn" onclick="openAlbumModal('${a.id}')">✎ edit</button>
        <button class="album-del-btn"  onclick="deleteAlbum('${a.id}')">✕ delete</button>
      </div>
    </div>`).join('')}
  </div><hr style="border:none;border-top:1px solid #eee;margin:0 0 20px;">` : '';

  // For grouped photos, only show the first photo of each group
  const seenRows = new Set();
  const displayPhotos = [];
  allPhotos.forEach((p, idx) => {
    if (p.rowId) {
      if (!seenRows.has(p.rowId)) { seenRows.add(p.rowId); displayPhotos.push({ p, idx }); }
    } else {
      displayPhotos.push({ p, idx });
    }
  });

  const grid = `<div class="all-photos-grid">` +
    displayPhotos.map(({ p, idx }) => `
      <div class="all-photo-cell" onclick="openLightbox(${idx})">
        <img src="${p.src}" alt="${esc(p.caption||'')}">
      </div>`).join('') +
    `</div>`;

  container.innerHTML = albumDir + grid;
}

// ── Single album ──────────────────────────────────────────────────
function openAlbum(id) {
  const album = albums.find(a => a.id === id);
  if (!album) return;
  currentAlbumId = id;
  exitSelectMode();
  renderSidebar(id);

  document.getElementById('album-list').style.display = 'none';
  document.getElementById('album-view').style.display  = 'block';
  document.getElementById('album-view-title').textContent = album.name;

  renderPhotoRows(album);
}

// ── Group photos into rows ────────────────────────────────────────
function groupPhotosIntoRows(photos) {
  const rowMap = new Map();
  const rowOrder = [];
  let autoBuffer = [];

  function flushAuto() {
    for (let i = 0; i < autoBuffer.length; i += ROW_CHUNK) {
      const chunk = autoBuffer.slice(i, i + ROW_CHUNK);
      const rid = '__auto_' + chunk[0].id;
      rowMap.set(rid, chunk);
      rowOrder.push(rid);
    }
    autoBuffer = [];
  }

  photos.forEach(p => {
    if (p.rowId) {
      flushAuto();
      if (!rowMap.has(p.rowId)) { rowMap.set(p.rowId, []); rowOrder.push(p.rowId); }
      rowMap.get(p.rowId).push(p);
    } else {
      autoBuffer.push(p);
    }
  });
  flushAuto();

  return rowOrder.map(rid => ({ rowId: rid, photos: rowMap.get(rid) }));
}

// ── Render photo rows ─────────────────────────────────────────────
function renderPhotoRows(album) {
  const photos = album.photos || [];
  const rows = groupPhotosIntoRows(photos);

  // Build flat photo list for lightbox
  lightboxPhotos = photos.slice();

  const container = document.getElementById('photo-rows');
  if (!photos.length) {
    container.innerHTML = '<p style="color:#ccc;font-size:14px;margin-top:20px;">' +
      'No photos yet' + (isAdmin ? ' — click <strong>+ Add Photos</strong>.' : '.') + '</p>';
    return;
  }

  container.innerHTML = rows.map((row, rowIdx) => {
    const imgs = row.photos.map(p => {
      const photoIdx = photos.findIndex(x => x.id === p.id);
      return `<div class="row-img" data-photo-id="${p.id}" data-photo-idx="${photoIdx}"
                   onclick="rowImgClick(event,'${p.id}',${photoIdx})">
        <img src="${p.src}" alt="${esc(p.caption||'')}">
        <div class="select-check">✓</div>
        ${isAdmin ? `<div class="photo-admin-btns">
          <button class="photo-edit-btn" onclick="event.stopPropagation();openPhotoModal('${p.id}')">✎</button>
          <button class="photo-del-btn"  onclick="event.stopPropagation();deletePhoto('${p.id}')">✕</button>
        </div>` : ''}
      </div>`;
    }).join('');

    return `<div class="photo-row" data-row-idx="${rowIdx}"
                 onclick="rowClick(event,${rowIdx})">${imgs}</div>`;
  });

  // Store rows data for modal access
  container._rows = rows;
}

// ── Row / image click logic ───────────────────────────────────────
function rowImgClick(e, photoId, photoIdx) {
  if (selectMode) {
    e.stopPropagation();
    toggleSelect(photoId, e.currentTarget);
  }
  // Otherwise let the event bubble up to rowClick
}

function rowClick(e, rowIdx) {
  if (selectMode) return;
  const container = document.getElementById('photo-rows');
  const rows = container._rows;
  if (!rows || !rows[rowIdx]) return;
  openRowModal(rows[rowIdx].photos);
}

// ── Row modal ─────────────────────────────────────────────────────
function openRowModal(photos) {
  const inner = document.getElementById('row-modal-inner');
  const label = photos[0] && photos[0].rowLabel;
  inner.innerHTML = (label ? `<div style="width:100%;font-size:13px;color:#aaa;letter-spacing:0.05em;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #eee;">${esc(label)}</div>` : '') +
    photos.map((p) => `
    <div class="row-modal-item">
      <img src="${p.src}" alt="${esc(p.caption||'')}">
      ${p.caption || p.date ? `
        <div class="row-modal-caption">${p.caption ? esc(p.caption) : ''}</div>
        ${p.date ? `<div class="row-modal-date">${esc(p.date)}</div>` : ''}
      ` : ''}
    </div>`).join('');

  document.getElementById('row-modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeRowModal() {
  document.getElementById('row-modal').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('row-modal-close').onclick = closeRowModal;
document.getElementById('row-modal').addEventListener('click', closeRowModal);


// ── Multi-select ──────────────────────────────────────────────────
function enterSelectMode() {
  selectMode = true;
  selectedPhotos.clear();
  document.body.classList.add('select-mode');
  updateSelectCount();
  populateMoveDropdown();
}
function exitSelectMode() {
  selectMode = false;
  selectedPhotos.clear();
  document.body.classList.remove('select-mode');
  document.querySelectorAll('.row-img.selected').forEach(el => el.classList.remove('selected'));
}
function toggleSelect(photoId, el) {
  if (selectedPhotos.has(photoId)) {
    selectedPhotos.delete(photoId);
    el.classList.remove('selected');
  } else {
    selectedPhotos.add(photoId);
    el.classList.add('selected');
  }
  updateSelectCount();
}
function updateSelectCount() {
  document.getElementById('select-count').textContent =
    selectedPhotos.size + ' selected';
}
function populateMoveDropdown() {
  const sel = document.getElementById('move-album-select');
  sel.innerHTML = '<option value="">— choose album —</option>' +
    albums.filter(a => a.id !== currentAlbumId).map(a =>
      `<option value="${a.id}">${esc(a.name)}</option>`
    ).join('');
}

async function bulkDelete() {
  if (!selectedPhotos.size) return;
  if (!confirm(`Delete ${selectedPhotos.size} photo(s)? This cannot be undone.`)) return;
  const album = albums.find(a => a.id === currentAlbumId);
  album.photos = album.photos.filter(p => !selectedPhotos.has(p.id));
  await persist();
  exitSelectMode();
  renderPhotoRows(album);
}

async function bulkMove() {
  const targetId = document.getElementById('move-album-select').value;
  if (!targetId || !selectedPhotos.size) return;
  const srcAlbum = albums.find(a => a.id === currentAlbumId);
  const dstAlbum = albums.find(a => a.id === targetId);
  if (!dstAlbum) return;

  const moving = srcAlbum.photos.filter(p => selectedPhotos.has(p.id));
  srcAlbum.photos = srcAlbum.photos.filter(p => !selectedPhotos.has(p.id));
  // Move to dst album, strip rowId so they get auto-grouped there
  moving.forEach(p => { delete p.rowId; dstAlbum.photos.push(p); });

  await persist();
  exitSelectMode();
  renderPhotoRows(srcAlbum);
}

// ── Drag to reorder ───────────────────────────────────────────────
function addPhotoDragHandlers() {
  document.querySelectorAll('#photo-rows .row-img').forEach(el => {
    el.draggable = true;
    el.addEventListener('dragstart', function(e) {
      dragSrc = this.dataset.photoIdx;
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragover', function(e) {
      e.preventDefault(); e.stopPropagation();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('#photo-rows .row-img').forEach(c => c.classList.remove('drag-over'));
      this.classList.add('drag-over');
    });
    el.addEventListener('dragleave', function() { this.classList.remove('drag-over'); });
    el.addEventListener('drop', function(e) {
      e.preventDefault(); e.stopPropagation();
      this.classList.remove('drag-over');
      const dropIdx = parseInt(this.dataset.photoIdx);
      const srcIdx  = parseInt(dragSrc);
      if (isNaN(srcIdx) || srcIdx === dropIdx) return;
      const album = albums.find(a => a.id === currentAlbumId);
      const moved = album.photos.splice(srcIdx, 1)[0];
      album.photos.splice(dropIdx, 0, moved);
      renderPhotoRows(album);
      persist(true);
    });
    el.addEventListener('dragend', function() {
      document.querySelectorAll('#photo-rows .row-img').forEach(c => c.classList.remove('drag-over'));
    });
  });
}

// ── Lightbox ──────────────────────────────────────────────────────
function openLightbox(idx) {
  lightboxIdx = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function updateLightbox() {
  const p = lightboxPhotos[lightboxIdx];
  document.getElementById('lightbox-img').src = p.src;
  const parts = [p.caption, p.date].filter(Boolean);
  document.getElementById('lightbox-caption').textContent = parts.join('  ·  ');
  document.getElementById('lightbox-counter').textContent =
    (lightboxIdx + 1) + ' / ' + lightboxPhotos.length;
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('lightbox-close').onclick = closeLightbox;
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});
document.getElementById('lightbox-prev').onclick = e => {
  e.stopPropagation();
  lightboxIdx = (lightboxIdx - 1 + lightboxPhotos.length) % lightboxPhotos.length;
  updateLightbox();
};
document.getElementById('lightbox-next').onclick = e => {
  e.stopPropagation();
  lightboxIdx = (lightboxIdx + 1) % lightboxPhotos.length;
  updateLightbox();
};
document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').classList.contains('active')) {
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft')  { lightboxIdx = (lightboxIdx - 1 + lightboxPhotos.length) % lightboxPhotos.length; updateLightbox(); }
    if (e.key === 'ArrowRight') { lightboxIdx = (lightboxIdx + 1) % lightboxPhotos.length; updateLightbox(); }
    return;
  }
  if (document.getElementById('row-modal').classList.contains('active') && e.key === 'Escape') {
    closeRowModal();
  }
});

// ── Back ──────────────────────────────────────────────────────────
document.getElementById('back-btn').onclick = renderAlbumList;
document.getElementById('album-view-edit-btn').onclick = () => openAlbumModal(currentAlbumId);

// ── Album modal ───────────────────────────────────────────────────
let editingAlbumId = null;

document.getElementById('add-album-btn').onclick     = () => openAlbumModal(null);
document.getElementById('album-modal-cancel').onclick = closeAlbumModal;
document.getElementById('album-cover-input').addEventListener('change', function() {
  previewFile(this, 'album-cover-preview');
});

function openAlbumModal(id) {
  editingAlbumId = id;
  const album = id ? albums.find(a => a.id === id) : null;
  document.getElementById('album-modal-title').textContent = id ? 'Edit Album' : 'New Album';
  document.getElementById('album-name-input').value = album ? album.name  : '';
  document.getElementById('album-desc-input').value = album ? (album.desc||'') : '';
  document.getElementById('album-cover-input').value = '';
  const prev = document.getElementById('album-cover-preview');
  if (album && album.cover) { prev.src = album.cover; prev.style.display = 'block'; }
  else { prev.src = ''; prev.style.display = 'none'; }
  document.getElementById('album-modal').classList.add('active');
  setTimeout(() => document.getElementById('album-name-input').focus(), 60);
}
function closeAlbumModal() { document.getElementById('album-modal').classList.remove('active'); }

document.getElementById('album-modal-save').onclick = async () => {
  const name = document.getElementById('album-name-input').value.trim();
  if (!name) { alert('Album name is required.'); return; }

  const btn = document.getElementById('album-modal-save');
  btn.textContent = 'Saving…'; btn.classList.add('modal-saving');

  let coverSrc = editingAlbumId ? ((albums.find(a=>a.id===editingAlbumId)||{}).cover||'') : '';
  const file = document.getElementById('album-cover-input').files[0];
  if (file) {
    const fd = new FormData(); fd.append('file', file); fd.append('type', 'albums');
    const up = await fetch(UPLOAD_URL, { method:'POST', body:fd }).then(r=>r.json()).catch(()=>({}));
    if (up.success) coverSrc = up.path;
    else if (up.error) { alert('Upload error: ' + up.error); btn.textContent='Save'; btn.classList.remove('modal-saving'); return; }
  }

  if (editingAlbumId) {
    const a = albums.find(a=>a.id===editingAlbumId);
    a.name = name;
    a.desc = document.getElementById('album-desc-input').value.trim();
    if (coverSrc) a.cover = coverSrc;
  } else {
    albums.push({ id: uid(), name, desc: document.getElementById('album-desc-input').value.trim(), cover: coverSrc, photos: [] });
  }

  await persist();
  btn.textContent='Save'; btn.classList.remove('modal-saving');
  closeAlbumModal();

  if (editingAlbumId && currentAlbumId === editingAlbumId) {
    document.getElementById('album-view-title').textContent = name;
    renderSidebar(currentAlbumId);
  } else {
    renderAlbumList();
  }
};

async function deleteAlbum(id) {
  const album = albums.find(a=>a.id===id);
  if (!confirm(`Delete album "${album.name}" and all its photos?\nThis cannot be undone.`)) return;
  albums = albums.filter(a=>a.id!==id);
  await persist();
  renderAlbumList();
}

// ── Photo modal ───────────────────────────────────────────────────
let editingPhotoId = null;

document.getElementById('add-photo-btn').onclick     = () => openPhotoModal(null);
document.getElementById('photo-modal-cancel').onclick = closePhotoModal;
document.getElementById('photo-file-input').addEventListener('change', function() {
  if (this.files[0]) previewFile(this, 'photo-file-preview');
});

function getExistingRowGroups() {
  const album = albums.find(a => a.id === currentAlbumId);
  if (!album) return [];
  const seen = new Map();
  (album.photos||[]).forEach(p => {
    if (p.rowId && !seen.has(p.rowId)) seen.set(p.rowId, p.rowLabel || p.rowId.slice(0,8));
  });
  return [...seen.entries()].map(([rowId, label]) => ({ rowId, label }));
}

function openPhotoModal(id) {
  editingPhotoId = id;
  const album = albums.find(a=>a.id===currentAlbumId);
  const photo = id ? (album.photos||[]).find(p=>p.id===id) : null;

  document.getElementById('photo-modal-title').textContent = id ? 'Edit Photo' : 'Add Photos';
  document.getElementById('photo-file-label').innerHTML = id
    ? 'Replace image <span style="color:#ccc">(optional)</span>'
    : 'Image files <span style="color:#ccc">(select one or many)</span>';
  document.getElementById('photo-file-input').multiple = !id;
  document.getElementById('photo-file-input').value = '';
  document.getElementById('photo-caption-input').value = photo ? (photo.caption||'') : '';
  document.getElementById('photo-date-input').value    = photo ? (photo.date||'') : '';
  document.getElementById('photo-group-input').value   = photo ? (photo.rowLabel||'') : '';

  // Row assignment dropdown (only when editing an existing photo)
  const rowLabel = document.getElementById('photo-row-label');
  const rowSel   = document.getElementById('photo-row-select');
  if (id) {
    rowLabel.style.display = 'block';
    rowSel.style.display   = 'block';
    const existingRows = getExistingRowGroups();
    rowSel.innerHTML = '<option value="">No group</option>' +
      existingRows.map(r => `<option value="${r.rowId}"${photo && photo.rowId===r.rowId?' selected':''}>${esc(r.label)}</option>`).join('') +
      '<option value="__new__">+ New group</option>';
  } else {
    rowLabel.style.display = 'none';
    rowSel.style.display   = 'none';
  }

  const prev = document.getElementById('photo-file-preview');
  if (photo) { prev.src = photo.src; prev.style.display = 'block'; }
  else { prev.src = ''; prev.style.display = 'none'; }

  document.getElementById('photo-modal').classList.add('active');
  setTimeout(() => document.getElementById('photo-caption-input').focus(), 60);
}
function closePhotoModal() { document.getElementById('photo-modal').classList.remove('active'); }

document.getElementById('photo-modal-save').onclick = async () => {
  const album = albums.find(a=>a.id===currentAlbumId);
  if (!album) return;

  const files      = document.getElementById('photo-file-input').files;
  const caption    = document.getElementById('photo-caption-input').value.trim();
  const date       = document.getElementById('photo-date-input').value.trim();
  const groupInput = document.getElementById('photo-group-input').value.trim();

  if (!editingPhotoId && !files.length) { alert('Please select at least one image.'); return; }

  const btn = document.getElementById('photo-modal-save');
  btn.textContent = 'Saving…'; btn.classList.add('modal-saving');

  if (editingPhotoId) {
    const photo = album.photos.find(p=>p.id===editingPhotoId);
    photo.caption = caption;
    photo.date    = date;

    const rowVal = document.getElementById('photo-row-select').value;
    if (rowVal === '__new__') {
      photo.rowId = uid();
      photo.rowLabel = groupInput || '';
    } else if (rowVal) {
      photo.rowId = rowVal;
      if (groupInput) photo.rowLabel = groupInput;
    } else {
      delete photo.rowId;
      delete photo.rowLabel;
    }

    if (files[0]) {
      const fd = new FormData(); fd.append('file', files[0]); fd.append('type', 'albums');
      const up = await fetch(UPLOAD_URL, {method:'POST',body:fd}).then(r=>r.json()).catch(()=>({}));
      if (up.success) photo.src = up.path;
      else if (up.error) { alert('Upload error: ' + up.error); btn.textContent='Save'; btn.classList.remove('modal-saving'); return; }
    }
  } else {
    // All files in this batch share the same rowId; group name labels the row
    const batchRowId = groupInput
      ? groupInput.toLowerCase().replace(/\s+/g, '-') + '-' + uid().slice(0,4)
      : uid();
    const batchLabel = groupInput || '';
    for (const file of files) {
      const fd = new FormData(); fd.append('file', file); fd.append('type', 'albums');
      const up = await fetch(UPLOAD_URL, {method:'POST',body:fd}).then(r=>r.json()).catch(()=>({}));
      if (!up.success) { alert('Upload error: ' + (up.error||'unknown error')); continue; }
      album.photos.push({ id: uid(), src: up.path, caption, date, rowId: batchRowId, rowLabel: batchLabel });
    }
  }

  await persist();
  btn.textContent = 'Save'; btn.classList.remove('modal-saving');
  closePhotoModal();
  renderPhotoRows(album);
};

async function deletePhoto(id) {
  if (!confirm('Remove this photo?')) return;
  const album = albums.find(a=>a.id===currentAlbumId);
  album.photos = album.photos.filter(p=>p.id!==id);
  await persist();
  renderPhotoRows(album);
}

// ── Persist ───────────────────────────────────────────────────────
async function persist(silent = false) {
  try {
    const res = await fetch(SAVE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(albums)
    }).then(r=>r.json());
    if (!res.success && !silent) alert('Save error: ' + (res.error||'unknown'));
  } catch(e) {
    if (!silent) alert('Network error — changes not saved.');
  }
}

// ── Helpers ───────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,9) + Date.now().toString(36); }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function previewFile(input, previewId) {
  const prev = document.getElementById(previewId);
  const file = input.files[0];
  if (!file) { prev.style.display='none'; return; }
  const reader = new FileReader();
  reader.onload = e => { prev.src = e.target.result; prev.style.display = 'block'; };
  reader.readAsDataURL(file);
}

init();
</script>
