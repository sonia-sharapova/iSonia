    .sidebar-link {

    .album-edit-btn {

    .album-del-btn {

      color: #c00;

    /* Album preview strip */

      letter-spacing: 0.05em;

    /* ── Single album view ── */

    .album-view-header {

    /* Photo grid */

      font-family: 'Optima', arial, sans-serif;

  </style>

<script>
const DATA_URL   = 'data/albums.json';
const SAVE_URL   = 'admin/save-albums.php';
const UPLOAD_URL = 'admin/upload-image.php';

let albums = [];
let currentAlbumId = null;
let lightboxPhotos = [];
let lightboxIdx = 0;
let isAdmin = false;
let dragSrc = null;

async function init() {
  try {
    const s = await fetch('admin/check-session.php').then(r => r.json());
    if (s.admin) { isAdmin = true; document.body.classList.add('admin-mode'); }
  } catch(e) {}

  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    albums = r.ok ? (await r.json()) : [];
    if (!Array.isArray(albums)) albums = [];
  } catch(e) { albums = []; }

  renderSidebar(null);
  renderAlbumList();
}

// ── Sidebar ──────────────────────────────────────────────────────
function renderSidebar(activeId) {
  const sidebarAll = document.getElementById('sidebar-all');
  const sidebarAlbums = document.getElementById('sidebar-albums');
  if (sidebarAll) sidebarAll.className = 'sidebar-link' + (activeId == null ? ' active' : '');
  if (sidebarAlbums) {
    sidebarAlbums.innerHTML = albums.map(a =>
      `<a class="sidebar-link${a.id === activeId ? ' active' : ''}" href="#"
          onclick="openAlbum('${a.id}');return false;">• ${esc(a.name)}</a>`
    ).join('');
  }
}

// ── Album list (flat grid of all photos) ─────────────────────────
function renderAlbumList() {
  currentAlbumId = null;
  renderSidebar(null);
  document.getElementById('album-list').style.display = 'block';
  document.getElementById('album-view').style.display  = 'none';

  const allPhotos = albums.flatMap(a => a.photos || []);
  lightboxPhotos = allPhotos.slice();

  const container = document.getElementById('albums-container');
  if (!allPhotos.length) {
    container.innerHTML = '<p style="color:#ccc;font-size:14px;margin-top:28px;">No photos yet' +
      (isAdmin ? ' — click <strong>+ New Album</strong> to start.' : '.') + '</p>';
    return;
  }

  container.innerHTML = '<div class="photo-grid">' +
    allPhotos.map((p, idx) => `
      <div class="photo-cell" data-idx="${idx}" onclick="openLightbox(${idx})">
        <img src="${p.src}" alt="${esc(p.caption||'')}">
      </div>`).join('') +
    '</div>';
}

// ── Single album ─────────────────────────────────────────────────
function openAlbum(id) {
  const album = albums.find(a => a.id === id);
  if (!album) return;
  currentAlbumId = id;
  renderSidebar(id);

  document.getElementById('album-list').style.display = 'none';
  document.getElementById('album-view').style.display  = 'block';
  document.getElementById('album-view-title').textContent = album.name;

  renderPhotoGrid(album);
}

function renderPhotoGrid(album) {
  const photos = album.photos || [];
  lightboxPhotos = photos.slice();

  const grid = document.getElementById('photo-grid');
  if (!photos.length) {
    grid.innerHTML = '<p style="color:#ccc;font-size:14px;grid-column:1/-1;margin-top:20px;">' +
      'No photos yet' + (isAdmin ? ' — click <strong>+ Add Photos</strong>.' : '.') + '</p>';
    return;
  }

  grid.innerHTML = photos.map((p, idx) => `
    <div class="photo-cell" data-idx="${idx}" data-id="${p.id}"
         onclick="cellClick(event,${idx})">
      <img src="${p.src}" alt="${esc(p.caption||'')}">
      <div class="photo-admin-btns">
        <button class="photo-edit-btn" onclick="event.stopPropagation();openPhotoModal('${p.id}')">✎</button>
        <button class="photo-del-btn"  onclick="event.stopPropagation();deletePhoto('${p.id}')">✕</button>
      </div>
      ${p.caption || p.date ? `<div class="photo-meta">
        ${p.caption ? `<div class="photo-meta-title">${esc(p.caption)}</div>` : ''}
        ${p.date    ? `<div class="photo-meta-sub">${esc(p.date)}</div>` : ''}
      </div>` : ''}
    </div>`).join('');

  if (isAdmin) addPhotoDragHandlers();
}

function cellClick(e, idx) {
  if (isAdmin) return;
  openLightbox(idx);
}

// ── Drag to reorder ───────────────────────────────────────────────
function addPhotoDragHandlers() {
  document.querySelectorAll('#photo-grid .photo-cell').forEach(el => {
    el.draggable = true;
    el.addEventListener('dragstart', function(e) {
      dragSrc = parseInt(this.dataset.idx);
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('#photo-grid .photo-cell').forEach(c => c.classList.remove('drag-over'));
      this.classList.add('drag-over');
    });
    el.addEventListener('dragleave', function() { this.classList.remove('drag-over'); });
    el.addEventListener('drop', function(e) {
      e.preventDefault();
      this.classList.remove('drag-over');
      const dropIdx = parseInt(this.dataset.idx);
      if (dragSrc === null || dragSrc === dropIdx) return;
      const album = albums.find(a => a.id === currentAlbumId);
      const moved = album.photos.splice(dragSrc, 1)[0];
      album.photos.splice(dropIdx, 0, moved);
      renderPhotoGrid(album);
      persist(true);
    });
    el.addEventListener('dragend', function() {
      document.querySelectorAll('#photo-grid .photo-cell').forEach(c => c.classList.remove('drag-over'));
    });
    el.addEventListener('click', function(e) {
      if (isAdmin && !e.target.closest('.photo-admin-btns')) {
        openLightbox(parseInt(this.dataset.idx));
      }
    });
  });
}

// ── Lightbox ─────────────────────────────────────────────────────
function openLightbox(idx) {
  lightboxIdx = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function updateLightbox() {
  const p = lightboxPhotos[lightboxIdx];
  document.getElementById('lightbox-img').src = p.src;
  const parts = [p.caption, p.date].filter(Boolean);
  document.getElementById('lightbox-caption').textContent = parts.join('  ·  ');
  document.getElementById('lightbox-counter').textContent =
    (lightboxIdx + 1) + ' / ' + lightboxPhotos.length;
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('lightbox-close').onclick = closeLightbox;
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});
document.getElementById('lightbox-prev').onclick = e => {
  e.stopPropagation();
  lightboxIdx = (lightboxIdx - 1 + lightboxPhotos.length) % lightboxPhotos.length;
  updateLightbox();
};
document.getElementById('lightbox-next').onclick = e => {
  e.stopPropagation();
  lightboxIdx = (lightboxIdx + 1) % lightboxPhotos.length;
  updateLightbox();
};
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape')      closeLightbox();
  if (e.key === 'ArrowLeft')  { lightboxIdx = (lightboxIdx - 1 + lightboxPhotos.length) % lightboxPhotos.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lightboxIdx = (lightboxIdx + 1) % lightboxPhotos.length; updateLightbox(); }
});

// ── Back ──────────────────────────────────────────────────────────
document.getElementById('back-btn').onclick = renderAlbumList;
document.getElementById('album-view-edit-btn').onclick = () => openAlbumModal(currentAlbumId);

// ── Album modal ───────────────────────────────────────────────────
let editingAlbumId = null;

document.getElementById('add-album-btn').onclick      = () => openAlbumModal(null);
document.getElementById('album-modal-cancel').onclick  = closeAlbumModal;
document.getElementById('album-cover-input').addEventListener('change', function() {
  previewFile(this, 'album-cover-preview');
});

function openAlbumModal(id) {
  editingAlbumId = id;
  const album = id ? albums.find(a => a.id === id) : null;
  document.getElementById('album-modal-title').textContent = id ? 'Edit Album' : 'New Album';
  document.getElementById('album-name-input').value = album ? album.name  : '';
  document.getElementById('album-desc-input').value = album ? (album.desc||'') : '';
  document.getElementById('album-cover-input').value = '';
  const prev = document.getElementById('album-cover-preview');
  if (album && album.cover) { prev.src = album.cover; prev.style.display = 'block'; }
  else { prev.src = ''; prev.style.display = 'none'; }
  document.getElementById('album-modal').classList.add('active');
  setTimeout(() => document.getElementById('album-name-input').focus(), 60);
}
function closeAlbumModal() { document.getElementById('album-modal').classList.remove('active'); }

document.getElementById('album-modal-save').onclick = async () => {
  const name = document.getElementById('album-name-input').value.trim();
  if (!name) { alert('Album name is required.'); return; }

  const btn = document.getElementById('album-modal-save');
  btn.textContent = 'Saving…'; btn.classList.add('modal-saving');

  let coverSrc = editingAlbumId ? ((albums.find(a=>a.id===editingAlbumId)||{}).cover||'') : '';
  const file = document.getElementById('album-cover-input').files[0];
  if (file) {
    const fd = new FormData(); fd.append('file', file); fd.append('type', 'albums');
    const up = await fetch(UPLOAD_URL, { method:'POST', body:fd }).then(r=>r.json()).catch(()=>({}));
    if (up.success) coverSrc = up.path;
    else if (up.error) { alert('Upload error: ' + up.error); btn.textContent='Save'; btn.classList.remove('modal-saving'); return; }
  }

  if (editingAlbumId) {
    const a = albums.find(a=>a.id===editingAlbumId);
    a.name = name;
    a.desc = document.getElementById('album-desc-input').value.trim();
    if (coverSrc) a.cover = coverSrc;
  } else {
    albums.push({ id: uid(), name, desc: document.getElementById('album-desc-input').value.trim(), cover: coverSrc, photos: [] });
  }

  await persist();
  btn.textContent='Save'; btn.classList.remove('modal-saving');
  closeAlbumModal();

  if (editingAlbumId && currentAlbumId === editingAlbumId) {
    document.getElementById('album-view-title').textContent = name;
    renderSidebar(currentAlbumId);
  } else {
    renderAlbumList();
  }
};

async function deleteAlbum(id) {
  const album = albums.find(a=>a.id===id);
  if (!confirm(`Delete album "${album.name}" and all its photos?\nThis cannot be undone.`)) return;
  albums = albums.filter(a=>a.id!==id);
  await persist();
  renderAlbumList();
}

// ── Photo modal ───────────────────────────────────────────────────
let editingPhotoId = null;

document.getElementById('add-photo-btn').onclick      = () => openPhotoModal(null);
document.getElementById('photo-modal-cancel').onclick  = closePhotoModal;
document.getElementById('photo-file-input').addEventListener('change', function() {
  if (this.files[0]) previewFile(this, 'photo-file-preview', true);
});

function openPhotoModal(id) {
  editingPhotoId = id;
  const album = albums.find(a=>a.id===currentAlbumId);
  const photo = id ? (album.photos||[]).find(p=>p.id===id) : null;

  document.getElementById('photo-modal-title').textContent = id ? 'Edit Photo' : 'Add Photos';
  document.getElementById('photo-file-label').innerHTML = id
    ? 'Replace image <span style="color:#ccc">(optional)</span>'
    : 'Image files <span style="color:#ccc">(select one or many)</span>';
  document.getElementById('photo-file-input').multiple = !id;
  document.getElementById('photo-file-input').value = '';
  document.getElementById('photo-caption-input').value = photo ? (photo.caption||'') : '';
  document.getElementById('photo-date-input').value    = photo ? (photo.date||'') : '';

  const prev = document.getElementById('photo-file-preview');
  if (photo) { prev.src = photo.src; prev.style.display = 'block'; }
  else { prev.src = ''; prev.style.display = 'none'; }

  document.getElementById('photo-modal').classList.add('active');
  setTimeout(() => document.getElementById('photo-caption-input').focus(), 60);
}
function closePhotoModal() { document.getElementById('photo-modal').classList.remove('active'); }

document.getElementById('photo-modal-save').onclick = async () => {
  const album = albums.find(a=>a.id===currentAlbumId);
  if (!album) return;

  const files   = document.getElementById('photo-file-input').files;
  const caption = document.getElementById('photo-caption-input').value.trim();
  const date    = document.getElementById('photo-date-input').value.trim();

  if (!editingPhotoId && !files.length) { alert('Please select at least one image.'); return; }

  const btn = document.getElementById('photo-modal-save');
  btn.textContent = 'Saving…'; btn.classList.add('modal-saving');

  if (editingPhotoId) {
    const photo = album.photos.find(p=>p.id===editingPhotoId);
    photo.caption = caption;
    photo.date    = date;
    if (files[0]) {
      const fd = new FormData(); fd.append('file', files[0]); fd.append('type', 'albums');
      const up = await fetch(UPLOAD_URL, {method:'POST',body:fd}).then(r=>r.json()).catch(()=>({}));
      if (up.success) photo.src = up.path;
      else if (up.error) { alert('Upload error: ' + up.error); btn.textContent='Save'; btn.classList.remove('modal-saving'); return; }
    }
  } else {
    for (const file of files) {
      const fd = new FormData(); fd.append('file', file); fd.append('type', 'albums');
      const up = await fetch(UPLOAD_URL, {method:'POST',body:fd}).then(r=>r.json()).catch(()=>({}));
      if (!up.success) { alert('Upload error: ' + (up.error||'unknown error')); continue; }
      album.photos.push({ id: uid(), src: up.path, caption, date });
    }
  }

  await persist();
  btn.textContent = 'Save'; btn.classList.remove('modal-saving');
  closePhotoModal();
  renderPhotoGrid(album);
};

async function deletePhoto(id) {
  if (!confirm('Remove this photo?')) return;
  const album = albums.find(a=>a.id===currentAlbumId);
  album.photos = album.photos.filter(p=>p.id!==id);
  await persist();
  renderPhotoGrid(album);
}

// ── Persist ───────────────────────────────────────────────────────
async function persist(silent = false) {
  try {
    const res = await fetch(SAVE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(albums)
    }).then(r=>r.json());
    if (!res.success && !silent) alert('Save error: ' + (res.error||'unknown'));
  } catch(e) {
    if (!silent) alert('Network error — changes not saved.');
  }
}

// ── Helpers ───────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,9) + Date.now().toString(36); }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function previewFile(input, previewId) {
  const prev = document.getElementById(previewId);
  const file = input.files[0];
  if (!file) { prev.style.display='none'; return; }
  const reader = new FileReader();
  reader.onload = e => { prev.src = e.target.result; prev.style.display = 'block'; };
  reader.readAsDataURL(file);
}

init();
</script>
