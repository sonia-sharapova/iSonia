<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sonia's Music Library</title>
    <link rel="icon" href="/images/icons/heart3.png" />
    <link rel="stylesheet" href="../styles/stylesheet.css">
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            width: 80%;
            margin: 0 auto;
            padding-right: 10px;
        }

        .item {
            aspect-ratio: 1;
            background: #fff;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s;
            overflow: visible;
        }

        .item:hover { transform: scale(1.05); }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 1px solid #666666;
            display: block;
            animation: none;
        }

        /* Edit button — shown via JS mouseenter/mouseleave in admin mode */
        .item-edit-btn {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.38);
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            z-index: 99;
            width: 100%;
            height: 100%;
            line-height: 1;
        }
        .item-edit-btn:hover { background: rgba(0,0,0,0.52); }

        body.admin-mode .item { cursor: pointer; transform: none !important; }
        .item.drag-over { outline: 2px solid #414141; opacity: 0.6; }

        /* Popup description */
        .description {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: #fff;
            padding: 20px;
            width: 500px;
            max-width: 90vw;
            max-height: 80vh;
            overflow: auto;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 200;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .description.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .description .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            cursor: pointer;
            font-size: 18px;
            color: #888;
            line-height: 1;
        }

        .description img.popup-cover {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border: 1px solid #ddd;
            float: left;
            margin: 0 16px 10px 0;
        }

        .description h2 { font-size: 16px; font-weight: bold; margin: 0 0 4px; }
        .description h3 { font-size: 13px; font-weight: normal; color: #666; margin: 0 0 10px; }
        .description p { font-size: 13px; line-height: 1.6; margin: 10px 0 0; clear: left; white-space: pre-line; }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 150;
        }
        .overlay.active { display: block; }

        /* Edit modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            overflow: auto;
        }

        .modal-box {
            background: white;
            margin: 60px auto;
            max-width: 460px;
            width: 95%;
            padding: 30px;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        .modal-box h2 { margin: 0 0 20px; font-size: 15px; font-weight: normal; text-transform: uppercase; letter-spacing: 2px; }
        .modal-box label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; display: block; margin-bottom: 4px; margin-top: 12px; }
        .modal-box input { width: 100%; padding: 8px; border: 1px solid #d5d5d5; font-family: 'Courier New', monospace; font-size: 13px; box-sizing: border-box; }
        .modal-box input:focus { outline: none; border-color: #414141; }

        .modal-actions { display: flex; gap: 10px; margin-top: 20px; align-items: center; }
        .btn-primary { padding: 9px 18px; background: #414141; color: white; border: none; font-family: 'Courier New', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .btn-secondary { padding: 9px 18px; background: white; color: #414141; border: 1px solid #d5d5d5; font-family: 'Courier New', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .btn-danger { padding: 9px 18px; background: white; color: #c0392b; border: 1px solid #c0392b; font-family: 'Courier New', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-left: auto; }
        .modal-status { font-size: 12px; color: #888; }

        @media (max-width: 1000px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>
<nav class="navigation">
  <a href="../index.html" class="nav-item">HOME</a>
  <a href="../creations/projects.html" class="nav-item">PROJECTS</a>
  <a href="../navigation/portfolio.html" class="nav-item">PORTFOLIO</a>
  <a href="../navigation/resources.html" class="nav-item">RESOURCES</a>
  <a href="../navigation/about.html" class="nav-item">ABOUT</a>
</nav>

<div class="title-container">
    <div class="nav-links">
        <a href="../index.html" class="sub-nav-item">SEE: </a>
        <a href="../personal/music.html" class="sub-nav-item">music</a>
        <a href="../personal/movies.html" class="sub-nav-item">movies</a>
        <a href="../personal/books.html" class="sub-nav-item">books</a>
        <a href="../personal/cards.html" class="sub-nav-item">cards</a>
    </div>
    <h1 class="page-title">ALBUMS</h1>
</div>

<div class="grid" id="grid"></div>

<!-- Popup description -->
<div class="description" id="popup">
    <div class="close-btn" id="close-popup">✕</div>
    <img class="popup-cover" id="popup-img" src="" alt="">
    <h2 id="popup-title"></h2>
    <h3 id="popup-artist"></h3>
    <hr>
    <p id="popup-desc"></p>
</div>
<div class="overlay" id="overlay"></div>

<!-- Edit / Add Album Modal -->
<div class="modal-overlay" id="music-modal">
    <div class="modal-box">
        <h2 id="modal-heading">Edit Album</h2>

        <label>Title</label>
        <input type="text" id="edit-title" placeholder="Album title">

        <label>Artist</label>
        <input type="text" id="edit-artist" placeholder="Artist name">

        <label>Description (optional)</label>
        <textarea id="edit-description" placeholder="Notes, favourites…" style="width:100%;padding:8px;border:1px solid #d5d5d5;font-family:'Courier New',monospace;font-size:13px;box-sizing:border-box;resize:vertical;height:80px;"></textarea>

        <label>Cover Image</label>
        <input type="file" id="edit-image-file" accept="image/*" style="font-family:'Courier New',monospace;font-size:12px;width:100%;box-sizing:border-box;">
        <input type="text" id="edit-image" placeholder="/images/music/filename.jpg" style="margin-top:6px;">
        <div style="margin-top:6px;">
            <img id="image-preview" src="" alt="" style="display:none;max-height:80px;max-width:80px;object-fit:contain;border:1px solid #d5d5d5;">
        </div>

        <div class="modal-actions">
            <button class="btn-primary" onclick="saveAlbum()">Save</button>
            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
            <span class="modal-status" id="modal-status"></span>
            <button class="btn-danger" id="delete-btn" onclick="deleteAlbum()">Delete</button>
        </div>
    </div>
</div>

<footer>
    <div class="socials">
        <a href="https://github.com/sonia-sharapova">GitHub</a>|
        <a href="https://www.linkedin.com/in/sonia-sharapova/">LinkedIn</a>|
        <a href="https://www.instagram.com/sonia.s.ru/">Instagram</a>
    </div>
    <div>Contact Links<br>2026</div>
</footer>

<script>
    let albums = [];
    let editingIndex = -1;
    let dragSrc = null;

    Promise.all([
        fetch('../data/music.json').then(r => r.json()).catch(() => []),
        fetch('../admin/check-session.php').then(r => r.json()).catch(() => ({}))
    ]).then(([data, session]) => {
        albums = Array.isArray(data) ? data : [];
        if (session.admin) document.body.classList.add('admin-mode');
        if (albums.length === 0 && !session.admin) {
            document.getElementById('grid').innerHTML = '<p style="color:#888;font-family:\'Courier New\',monospace;">Could not load albums.</p>';
            return;
        }
        renderGrid();
    });

    function renderGrid() {
        const admin = document.body.classList.contains('admin-mode');
        const grid = document.getElementById('grid');
        grid.innerHTML = albums.map((a, i) => `
            <div class="item" data-index="${i}">
                <img src="${a.image}" alt="${escHtml(a.title)}" loading="lazy">
                ${admin ? `<button class="item-edit-btn" onclick="event.stopPropagation(); openEdit(${i})">✎</button>` : ''}
            </div>`).join('');

        if (admin) {
            // Show/hide the overlay button on mouseenter/mouseleave
            grid.querySelectorAll('.item').forEach((el, i) => {
                const btn = el.querySelector('.item-edit-btn');
                el.addEventListener('mouseenter', () => { if (btn) btn.style.display = 'block'; });
                el.addEventListener('mouseleave', () => { if (btn) btn.style.display = 'none'; });
                el.addEventListener('click', () => openEdit(i));
            });
            addDragHandlers();
            appendAddButton();
        } else {
            // Normal mode: click opens popup
            grid.querySelectorAll('.item').forEach((el, i) => {
                el.addEventListener('click', () => showPopup(i));
            });
        }
    }

    // --- Popup ---
    function showPopup(i) {
        if (document.body.classList.contains('admin-mode')) return; // edit mode: no popup
        const a = albums[i];
        document.getElementById('popup-img').src = a.image;
        document.getElementById('popup-title').textContent = a.title;
        document.getElementById('popup-artist').textContent = a.artist;
        document.getElementById('popup-desc').textContent = a.description || '';
        document.getElementById('popup').classList.add('active');
        document.getElementById('overlay').classList.add('active');
    }

    document.getElementById('close-popup').addEventListener('click', closePopup);
    document.getElementById('overlay').addEventListener('click', closePopup);
    function closePopup() {
        document.getElementById('popup').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
    }

    // --- Drag to reorder (admin only) ---
    function addDragHandlers() {
        document.querySelectorAll('.item').forEach(el => {
            el.draggable = true;

            el.addEventListener('dragstart', function(e) {
                dragSrc = parseInt(this.dataset.index);
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => this.style.opacity = '0.4', 0);
            });

            el.addEventListener('dragend', function() {
                this.style.opacity = '';
                document.querySelectorAll('.item').forEach(t => t.classList.remove('drag-over'));
            });

            el.addEventListener('dragover', function(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                document.querySelectorAll('.item').forEach(t => t.classList.remove('drag-over'));
                this.classList.add('drag-over');
            });

            el.addEventListener('drop', function(e) {
                e.preventDefault();
                const dropTarget = parseInt(this.dataset.index);
                if (dragSrc === null || dragSrc === dropTarget) return;
                const item = albums.splice(dragSrc, 1)[0];
                albums.splice(dropTarget, 0, item);
                renderGrid();
                persistAlbums(true); // silent save
            });
        });
    }

    // Admin session is checked in Promise.all above alongside data fetch

    function appendAddButton() {
        if (document.getElementById('add-album-btn')) return;
        const btn = document.createElement('button');
        btn.id = 'add-album-btn';
        btn.textContent = '+ Add Album';
        btn.onclick = openAdd;
        btn.style.cssText = 'position:fixed;bottom:30px;right:30px;padding:10px 18px;background:#414141;color:white;border:none;font-family:"Courier New",monospace;font-size:12px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;z-index:500;';
        document.body.appendChild(btn);
    }

    function openEdit(i) {
        editingIndex = i;
        const a = albums[i];
        document.getElementById('modal-heading').textContent = 'Edit Album';
        document.getElementById('edit-title').value = a.title;
        document.getElementById('edit-artist').value = a.artist || '';
        document.getElementById('edit-description').value = a.description || '';
        document.getElementById('edit-image').value = a.image;
        document.getElementById('edit-image-file').value = '';
        setImagePreview(a.image);
        document.getElementById('modal-status').textContent = '';
        document.getElementById('delete-btn').style.display = 'inline-block';
        document.getElementById('music-modal').style.display = 'block';
    }

    function openAdd() {
        editingIndex = -1;
        document.getElementById('modal-heading').textContent = 'Add Album';
        ['edit-title','edit-artist','edit-image'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('edit-description').value = '';
        document.getElementById('edit-image-file').value = '';
        setImagePreview('');
        document.getElementById('modal-status').textContent = '';
        document.getElementById('delete-btn').style.display = 'none';
        document.getElementById('music-modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('music-modal').style.display = 'none'; }

    function setImagePreview(src) {
        const p = document.getElementById('image-preview');
        if (src) { p.src = src; p.style.display = 'block'; }
        else { p.src = ''; p.style.display = 'none'; }
    }

    document.getElementById('edit-image-file').addEventListener('change', function() {
        if (this.files[0]) { setImagePreview(URL.createObjectURL(this.files[0])); document.getElementById('edit-image').value = ''; }
    });
    document.getElementById('edit-image').addEventListener('input', function() {
        if (this.value.trim()) { setImagePreview(this.value.trim()); document.getElementById('edit-image-file').value = ''; }
    });

    async function saveAlbum() {
        const title = document.getElementById('edit-title').value.trim();
        const artist = document.getElementById('edit-artist').value.trim();
        const description = document.getElementById('edit-description').value.trim();
        const imagePathInput = document.getElementById('edit-image').value.trim();
        const fileInput = document.getElementById('edit-image-file');
        const status = document.getElementById('modal-status');

        if (!title) { status.textContent = 'Title is required.'; return; }
        status.textContent = 'Saving…';

        let imagePath = imagePathInput;
        if (fileInput.files[0]) {
            imagePath = await uploadImage(fileInput.files[0]);
            if (!imagePath) return;
        }
        if (!imagePath) { status.textContent = 'Please provide an image.'; return; }

        if (editingIndex >= 0) {
            albums[editingIndex] = { title, artist, image: imagePath, description };
        } else {
            albums.push({ title, artist, image: imagePath, description });
        }

        const ok = await persistAlbums();
        if (ok) { renderGrid(); setTimeout(closeModal, 500); }
    }

    async function deleteAlbum() {
        if (editingIndex < 0 || !confirm(`Remove "${albums[editingIndex].title}"?`)) return;
        albums.splice(editingIndex, 1);
        const ok = await persistAlbums();
        if (ok) { renderGrid(); closeModal(); }
    }

    async function uploadImage(file) {
        const status = document.getElementById('modal-status');
        const formData = new FormData();
        formData.append('image', file);
        formData.append('type', 'music');
        try {
            const res = await fetch('../admin/upload-image.php', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) return data.path;
            status.textContent = 'Upload error: ' + (data.error || 'unknown');
        } catch(e) { status.textContent = 'Upload failed: ' + e.message; }
        return null;
    }

    async function persistAlbums(silent = false) {
        const status = document.getElementById('modal-status');
        try {
            const res = await fetch('../admin/save-music.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(albums)
            });
            const data = await res.json();
            if (data.success) { if (!silent) status.textContent = 'Saved!'; return true; }
            if (!silent) status.textContent = 'Error: ' + (data.error || 'unknown');
        } catch(e) { if (!silent) status.textContent = 'Error: ' + e.message; }
        return false;
    }

    document.getElementById('music-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
