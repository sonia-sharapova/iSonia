<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sonia's Movies</title>
    <link rel="icon" href="/images/icons/heart3.png" />
    <link rel="stylesheet" href="../styles/stylesheet.css">
    <style>
        .content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            width: 80%;
            margin: 40px auto;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 30px;
            margin-right: 20px;
            margin-bottom: 70px;
        }

        .thumbnail {
            aspect-ratio: 2/3;
            cursor: pointer;
            transition: opacity 0.3s;
            position: relative;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 1px solid #666666;
        }

        .thumbnail:hover { opacity: 0.7; }

        /* Admin edit overlay */
        .thumb-edit-btn {
            display: none;
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            font-size: 12px;
            padding: 3px 6px;
            cursor: pointer;
            z-index: 10;
            line-height: 1;
        }

        body.admin-mode .thumbnail:hover .thumb-edit-btn { display: block; }
        body.admin-mode .thumbnail:hover { opacity: 1; }
        body.admin-mode .thumbnail:hover img { opacity: 0.7; }
        body.admin-mode .thumbnail { cursor: grab; }
        .thumbnail.drag-over { outline: 2px solid #414141; opacity: 0.6; }

        .preview-section {
            position: sticky;
            top: 120px;
            background: #f5f5f5;
            padding: 20px;
            height: calc(100vh - 200px);
            border: 1px solid #666666;
            display: flex;
            flex-direction: column;
        }

        .preview-img {
            min-width: 200px;
            width: 100%;
            border: 1px solid #666666;
            flex-shrink: 0;
        }

        .movie-info {
            margin-top: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .movie-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .movie-description {
            font-size: 10px;
            line-height: 1.5;
            color: #666;
            padding-right: 10px;
        }

        @media (max-width: 1000px) {
            .gallery { grid-template-columns: repeat(4, 1fr); gap: 10px; }
            .content { gap: 20px; margin: 20px auto; }
        }
        @media (max-width: 760px) {
            .gallery { width: 100%; grid-template-columns: repeat(2, 1fr); }
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            overflow: auto;
        }

        .modal-box {
            background: white;
            margin: 60px auto;
            max-width: 460px;
            width: 95%;
            padding: 30px;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        .modal-box h2 {
            margin: 0 0 20px;
            font-size: 15px;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .modal-box label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            display: block;
            margin-bottom: 4px;
            margin-top: 12px;
        }

        .modal-box input {
            width: 100%;
            padding: 8px;
            border: 1px solid #d5d5d5;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            box-sizing: border-box;
        }

        .modal-box input:focus { outline: none; border-color: #414141; }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            align-items: center;
        }

        .btn-primary {
            padding: 9px 18px;
            background: #414141;
            color: white;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .btn-secondary {
            padding: 9px 18px;
            background: white;
            color: #414141;
            border: 1px solid #d5d5d5;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .btn-danger {
            padding: 9px 18px;
            background: white;
            color: #c0392b;
            border: 1px solid #c0392b;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-left: auto;
        }

        .modal-status { font-size: 12px; color: #888; }
    </style>
</head>
<body>
<nav class="navigation">
  <a href="../index.html" class="nav-item">HOME</a>
  <a href="../creations/projects.html" class="nav-item">PROJECTS</a>
  <a href="../navigation/portfolio.html" class="nav-item">PORTFOLIO</a>
  <a href="../navigation/resources.html" class="nav-item">RESOURCES</a>
  <a href="../navigation/about.html" class="nav-item">ABOUT</a>
</nav>

<div class="title-container">
    <div class="nav-links">
        <a href="../index.html" class="sub-nav-item">SEE: </a>
        <a href="../personal/music.html" class="sub-nav-item">music</a>
        <a href="../personal/movies.html" class="sub-nav-item">movies</a>
        <a href="../personal/books.html" class="sub-nav-item">books</a>
        <a href="../personal/cards.html" class="sub-nav-item">cards</a>
    </div>
    <h1 class="page-title">FILMS</h1>
</div>

<div class="content">
    <div class="gallery" id="gallery">
        <p style="color:#888;font-family:'Courier New',monospace;font-size:13px;">Loading…</p>
    </div>

    <div class="preview-section">
        <img id="preview-img" src="" alt="Preview" class="preview-img">
        <div class="movie-info">
            <div class="movie-title" id="movie-title"></div>
            <div class="movie-description" id="movie-description"></div>
        </div>
    </div>
</div>

<!-- Edit / Add Movie Modal -->
<div class="modal-overlay" id="movie-modal">
    <div class="modal-box">
        <h2 id="modal-heading">Edit Film</h2>

        <label>Title</label>
        <input type="text" id="edit-title" placeholder="Film title">

        <label>Director (optional)</label>
        <input type="text" id="edit-director" placeholder="Director name">

        <label>Description (optional)</label>
        <textarea id="edit-description" placeholder="A note about this film…" style="width:100%;padding:8px;border:1px solid #d5d5d5;font-family:'Courier New',monospace;font-size:13px;box-sizing:border-box;resize:vertical;height:80px;"></textarea>

        <label>Cover Image</label>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;">
            <input type="file" id="edit-image-file" accept="image/*" style="font-family:'Courier New',monospace;font-size:12px;flex:1;">
        </div>
        <input type="text" id="edit-image" placeholder="/images/movies/filename.jpg" style="margin-top:4px;">
        <div style="margin-top:6px;">
            <img id="image-preview" src="" alt="" style="display:none;max-height:100px;max-width:70px;object-fit:contain;border:1px solid #d5d5d5;">
        </div>

        <div class="modal-actions">
            <button class="btn-primary" onclick="saveMovie()">Save</button>
            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
            <span class="modal-status" id="modal-status"></span>
            <button class="btn-danger" id="delete-btn" onclick="deleteMovie()">Delete</button>
        </div>
    </div>
</div>

<footer>
    <div class="socials">
        <a href="https://github.com/sonia-sharapova">GitHub</a>|
        <a href="https://www.linkedin.com/in/sonia-sharapova/">LinkedIn</a>|
        <a href="https://www.instagram.com/sonia.s.ru/">Instagram</a>
    </div>
    <div>Contact Links<br>2026</div>
</footer>

<script>
    let movies = [];
    let editingIndex = -1;
    let dragSrc = null;

    const previewImg = document.getElementById('preview-img');
    const movieTitle = document.getElementById('movie-title');
    const movieDescription = document.getElementById('movie-description');

    fetch('../data/movies.json')
        .then(r => r.json())
        .then(data => {
            movies = data;
            renderGallery();
            if (movies.length) showPreview(0);
        })
        .catch(() => {
            document.getElementById('gallery').innerHTML = '<p style="color:#888;">Could not load films.</p>';
        });

    function renderGallery() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = movies.map((m, i) => `
            <div class="thumbnail" data-index="${i}" onclick="showPreview(${i})">
                <img src="${m.image}" alt="${escHtml(m.title)}" loading="lazy">
                <button class="thumb-edit-btn" onclick="event.stopPropagation(); openEdit(${i})">✎</button>
            </div>`).join('');

        if (document.body.classList.contains('admin-mode')) {
            addDragHandlers();
            appendAddButton();
        }
    }

    function addDragHandlers() {
        document.querySelectorAll('#gallery .thumbnail').forEach(el => {
            el.draggable = true;
            el.addEventListener('dragstart', function(e) {
                dragSrc = parseInt(this.dataset.index);
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => this.style.opacity = '0.4', 0);
            });
            el.addEventListener('dragend', function() {
                this.style.opacity = '';
                document.querySelectorAll('#gallery .thumbnail').forEach(t => t.classList.remove('drag-over'));
            });
            el.addEventListener('dragover', function(e) {
                e.preventDefault();
                document.querySelectorAll('#gallery .thumbnail').forEach(t => t.classList.remove('drag-over'));
                this.classList.add('drag-over');
            });
            el.addEventListener('drop', function(e) {
                e.preventDefault();
                const dropTarget = parseInt(this.dataset.index);
                if (dragSrc === null || dragSrc === dropTarget) return;
                const item = movies.splice(dragSrc, 1)[0];
                movies.splice(dropTarget, 0, item);
                renderGallery();
                persistMovies(true);
            });
        });
    }

    function showPreview(i) {
        const m = movies[i];
        previewImg.src = m.image;
        previewImg.alt = m.title;
        movieTitle.textContent = m.title;
        movieDescription.innerHTML = (m.director ? `<em>${escHtml(m.director)}</em><br><br>` : '')
            + (m.description ? escHtml(m.description) : '');
    }

    // --- Admin ---
    fetch('../admin/check-session.php')
        .then(r => r.json())
        .then(data => {
            if (data.admin) {
                document.body.classList.add('admin-mode');
                appendAddButton();
            }
        })
        .catch(() => {});

    function appendAddButton() {
        if (document.getElementById('add-movie-btn')) return;
        const btn = document.createElement('button');
        btn.id = 'add-movie-btn';
        btn.textContent = '+ Add Film';
        btn.onclick = openAdd;
        btn.style.cssText = 'position:fixed;bottom:30px;right:30px;padding:10px 18px;background:#414141;color:white;border:none;font-family:"Courier New",monospace;font-size:12px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;z-index:500;';
        document.body.appendChild(btn);
    }

    function openEdit(i) {
        editingIndex = i;
        const m = movies[i];
        document.getElementById('modal-heading').textContent = 'Edit Film';
        document.getElementById('edit-title').value = m.title;
        document.getElementById('edit-director').value = m.director || '';
        document.getElementById('edit-description').value = m.description || '';
        document.getElementById('edit-image').value = m.image;
        document.getElementById('edit-image-file').value = '';
        setImagePreview(m.image);
        document.getElementById('modal-status').textContent = '';
        document.getElementById('delete-btn').style.display = 'inline-block';
        document.getElementById('movie-modal').style.display = 'block';
    }

    function openAdd() {
        editingIndex = -1;
        document.getElementById('modal-heading').textContent = 'Add Film';
        document.getElementById('edit-title').value = '';
        document.getElementById('edit-director').value = '';
        document.getElementById('edit-description').value = '';
        document.getElementById('edit-image').value = '';
        document.getElementById('edit-image-file').value = '';
        setImagePreview('');
        document.getElementById('modal-status').textContent = '';
        document.getElementById('delete-btn').style.display = 'none';
        document.getElementById('movie-modal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('movie-modal').style.display = 'none';
    }

    function setImagePreview(src) {
        const preview = document.getElementById('image-preview');
        if (src) { preview.src = src; preview.style.display = 'block'; }
        else { preview.src = ''; preview.style.display = 'none'; }
    }

    document.getElementById('edit-image-file').addEventListener('change', function() {
        if (this.files[0]) {
            setImagePreview(URL.createObjectURL(this.files[0]));
            document.getElementById('edit-image').value = '';
        }
    });

    document.getElementById('edit-image').addEventListener('input', function() {
        if (this.value.trim()) {
            setImagePreview(this.value.trim());
            document.getElementById('edit-image-file').value = '';
        }
    });

    async function saveMovie() {
        const title = document.getElementById('edit-title').value.trim();
        const director = document.getElementById('edit-director').value.trim();
        const description = document.getElementById('edit-description').value.trim();
        const imagePathInput = document.getElementById('edit-image').value.trim();
        const fileInput = document.getElementById('edit-image-file');
        const status = document.getElementById('modal-status');

        if (!title) { status.textContent = 'Title is required.'; return; }

        status.textContent = 'Saving…';

        let imagePath = imagePathInput;
        if (fileInput.files[0]) {
            imagePath = await uploadImage(fileInput.files[0]);
            if (!imagePath) return;
        }

        if (!imagePath) { status.textContent = 'Please provide an image.'; return; }

        if (editingIndex >= 0) {
            movies[editingIndex] = { title, director, image: imagePath, description };
        } else {
            movies.push({ title, director, image: imagePath, description });
        }

        const ok = await persistMovies();
        if (ok) {
            renderGallery();
            showPreview(editingIndex >= 0 ? editingIndex : movies.length - 1);
            setTimeout(closeModal, 500);
        }
    }

    async function deleteMovie() {
        if (editingIndex < 0 || !confirm(`Remove "${movies[editingIndex].title}"?`)) return;
        movies.splice(editingIndex, 1);
        const ok = await persistMovies();
        if (ok) {
            renderGallery();
            if (movies.length) showPreview(0);
            closeModal();
        }
    }

    async function uploadImage(file) {
        const status = document.getElementById('modal-status');
        const formData = new FormData();
        formData.append('image', file);
        formData.append('type', 'movies');
        try {
            const res = await fetch('../admin/upload-image.php', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) return data.path;
            status.textContent = 'Upload error: ' + (data.error || 'unknown');
        } catch(e) {
            status.textContent = 'Upload failed: ' + e.message;
        }
        return null;
    }

    async function persistMovies(silent = false) {
        const status = document.getElementById('modal-status');
        try {
            const res = await fetch('../admin/save-movies.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(movies)
            });
            const data = await res.json();
            if (data.success) { if (!silent) status.textContent = 'Saved!'; return true; }
            if (!silent) status.textContent = 'Error: ' + (data.error || 'unknown');
        } catch(e) {
            if (!silent) status.textContent = 'Error: ' + e.message;
        }
        return false;
    }

    document.getElementById('movie-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
