<!-- Contact Modal -->
<div class="modal" id="contactModal" style="z-index: 2000;">
  <div class="modal-content" style="max-width: 480px; background: #f5f5f5; padding: 0; border-radius: 5px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);">

      <form id="mobile-contact-form">
        <div style="margin-bottom: 10px;">
          <label for="mobile-name" style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">Your Name</label>
          <input type="text" id="mobile-name" name="name" required
                 style="width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; font-family: 'Optima', serif; box-sizing: border-box; background: #fff; color: #444;">
        </div>

        <div style="margin-bottom: 10px;">
          <label for="mobile-email" style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">Your Email</label>
          <input type="email" id="mobile-email" name="email" required
                 style="width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; font-family: 'Optima', serif; box-sizing: border-box; background: #fff; color: #444;">
        </div>

        <div style="margin-bottom: 10px;">
          <label for="mobile-subject" style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">Subject</label>
          <input type="text" id="mobile-subject" name="subject" required
                 style="width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; font-family: 'Optima', serif; box-sizing: border-box; background: #fff; color: #444;">
        </div>

        <div style="margin-bottom: 16px;">
          <label for="mobile-message" style="display: block; margin-bottom: 5px; font-size: 14px; color: #666;">Message</label>
          <textarea id="mobile-message" name="message" rows="5" required
                    style="width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; font-family: 'Optima', serif; box-sizing: border-box; background: #fff; color: #444; resize: vertical;"></textarea>
        </div>

        <button type="submit"
                style="width: 100%; padding: 11px; background: rgba(210,245,250,0.5); font-family: 'Optima', serif; color: rgba(72,72,72,0.85); border: 1px solid rgba(143,97,77,0.3); border-radius: 4px; font-size: 16px; cursor: pointer; transition: filter 0.2s;">
          ---- send ----
        </button>

        <div id="mobile-form-message" style="margin-top: 12px; text-align: center; font-size: 14px; color: #666; display: none;"></div>
      </form>
    </div>
  </div>
</div>

<script>
  function openContactModal() {
    document.getElementById('contactModal').classList.add('active');
  }

  const openModalBtn = document.getElementById('open-contact-modal');
  if (openModalBtn) openModalBtn.addEventListener('click', openContactModal);

  // Close contact modal
  document.getElementById('closeContactModal').addEventListener('click', function() {
    document.getElementById('contactModal').classList.remove('active');
  });

  // Close modal when clicking outside
  document.getElementById('contactModal').addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('active');
    }
  });

  // Handle mobile form submission
  document.getElementById('mobile-contact-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const messageDiv = document.getElementById('mobile-form-message');
    const submitButton = this.querySelector('button[type="submit"]');

    submitButton.disabled = true;
    submitButton.textContent = 'Sending...';

    fetch('send_email.php', {
      method: 'POST',
      body: formData
    })
            .then(response => response.json())
            .then(data => {
              messageDiv.style.display = 'block';

              if (data.success) {
                messageDiv.style.color = 'green';
                messageDiv.textContent = data.message;
                document.getElementById('mobile-contact-form').reset();
              } else {
                messageDiv.style.color = 'red';
                messageDiv.textContent = data.message;
              }

              submitButton.disabled = false;
              submitButton.textContent = 'Send Message';

              setTimeout(() => {
                messageDiv.style.display = 'none';
              }, 5000);
            })
            .catch(error => {
              messageDiv.style.display = 'block';
              messageDiv.style.color = 'red';
              messageDiv.textContent = 'An error occurred. Please try again.';
              submitButton.disabled = false;
              submitButton.textContent = 'Send Message';
            });
  });
</script>

<script>
  fetch('data/posts.json')
    .then(r => r.json())
    .then(posts => {
      const container = document.getElementById('recent-posts');
      if (!posts.length) return;
      container.innerHTML = posts.slice(0, 3).map(p => `
        <a href="creations/blogs/entry.html?post=${p.slug}" style="text-decoration:none">
          <div class="blog-entry">
            <div class="blog-entry-header">
              <h2 class="blog-entry-title">${p.title}</h2>
              <span class="blog-entry-date">${p.date}</span>
            </div>
            ${p.excerpt ? `<p class="blog-entry-excerpt">${p.excerpt}</p>` : ''}
          </div>
        </a>`).join('');
    })
    .catch(() => {});
</script>
